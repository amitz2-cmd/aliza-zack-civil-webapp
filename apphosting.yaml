# Firebase App Hosting configuration.
# Reference: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3
  concurrency: 80

# Public Firebase config — set these in the App Hosting backend's
# environment variables (Firebase Console -> App Hosting -> Settings).
# They are NEXT_PUBLIC_* so they are bundled into the client at build time.
# env:
#   - variable: NEXT_PUBLIC_FIREBASE_API_KEY
#     value: ...
#     availability: [BUILD, RUNTIME]
#   - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#     value: ...
#     availability: [BUILD, RUNTIME]
#   - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
#     value: ...
#     availability: [BUILD, RUNTIME]
#   - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#     value: ...
#     availability: [BUILD, RUNTIME]
#   - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#     value: ...
#     availability: [BUILD, RUNTIME]
#   - variable: NEXT_PUBLIC_FIREBASE_APP_ID
#     value: ...
#     availability: [BUILD, RUNTIME]
